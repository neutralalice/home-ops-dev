---
name: "Renovate"

on:
  merge_group:
  push:
    branches:
      - main
    paths:
      - .github/workflows/renovate.yaml
      - .github/renovate.json5
      - .github/renovate/**.json5
  schedule:
    - cron: "44 */2 * * *"
  workflow_dispatch:
    inputs:
      dryRun:
        description: Dry Run
        default: null
        type: choice
        options:
          - false # null
          - extract
          - lookup
          - full
        required: true
      logLevel:
        description: Log Level
        default: info
        type: choice
        options:
          - debug
          - info
          - warn
          - error
          - fatal
        required: true
      version:
        description: Renovate Version
        default: latest
        type: string
        required: true

concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}

permissions:
  contents: read

jobs:
  renovate:
    name: Renovate
    runs-on: ubuntu-26.04-arm
    permissions:
      packages: read
    steps:
      - name: Generate Token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        id: app-token
        with:
          client-id: "${{ secrets.BOT_CLIENT_ID }}"
          private-key: "${{ secrets.BOT_PRIVATE_KEY }}"
          permission-checks: write
          permission-contents: write
          permission-issues: write
          permission-pull-requests: write
          permission-statuses: write
          permission-vulnerability-alerts: read
          permission-workflows: write

      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
          token: "${{ steps.app-token.outputs.token }}"

      - name: Renovate
        uses: renovatebot/github-action@3064367f740a1a91cca218698a63902689cce200 # v46.1.20
        env:
          LOG_LEVEL: "${{ inputs.logLevel || 'info' }}"
          RENOVATE_AUTODISCOVER: true
          RENOVATE_AUTODISCOVER_FILTER: "${{ github.repository }}"
          RENOVATE_DRY_RUN: "${{ inputs.dryRun || 'false' }}"
          RENOVATE_GIT_AUTHOR: "${{ secrets.BOT_USERNAME }} <${{ secrets.BOT_USER_ID }}+${{ secrets.BOT_USERNAME }}[bot]@users.noreply.github.com>"
          RENOVATE_PLATFORM: github
          RENOVATE_PLATFORM_COMMIT: "enabled"
          RENOVATE_USERNAME: "${{ secrets.BOT_USERNAME }}[bot]"
        with:
          renovate-version: "${{ inputs.version || 'latest' }}"
          token: "${{ steps.app-token.outputs.token }}"
