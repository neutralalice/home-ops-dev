---
apiVersion: resource.k8s.io/v1
kind: ResourceClaimTemplate
metadata:
  name: ${APP}-gpu
spec:
  spec:
    devices:
      requests:
        - name: gpu
          exactly:
            deviceClassName: gpu.intel.com
            selectors:
              - cel:
                  expression: device.attributes["gpu.intel.com"].type == "vf"
              - cel:
                  expression: device.attributes["gpu.intel.com"].pciId == "0x46a6"
