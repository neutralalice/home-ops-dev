---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rook-ceph-cluster
spec:
  chartRef:
    kind: OCIRepository
    name: rook-ceph-cluster
  interval: 30m
  values:
    monitoring:
      enabled: true
      createPrometheusRules: true
    toolbox:
      enabled: false
    cephClusterSpec:
      cephConfig:
        global:
          bdev_enable_discard: "true" # quote
          bdev_async_discard_threads: "1" # quote
          osd_class_update_on_start: "false" # quote
          device_failure_prediction_mode: local # requires mgr module
        mgr:
          mgr/crash/warn_recent_interval: "7200" # 2h
      cleanupPolicy:
        wipeDevicesFromOtherClusters: true
      crashCollector:
        disable: false
      csi:
        readAffinity:
          enabled: false
      dashboard:
        enabled: true
        urlPrefix: /
        ssl: false
        prometheusEndpoint: http://prometheus-operated.observability.svc.cluster.local:9090
      mgr:
        modules:
          - name: diskprediction_local
            enabled: true
          - name: insights
            enabled: true
          - name: pg_autoscaler
            enabled: true
          - name: rook
            enabled: true
      network:
        provider: host
        addressRanges:
          cluster:
            - 169.254.255.0/24
          public:
            - 169.254.255.0/24
        connections:
          requireMsgr2: true
      resources:
        cleanup:
          limits:
            cpu: 500m
            memory: 1024Mi
          requests:
            cpu: 500m
            memory: 1024Mi
        crashcollector:
          limits:
            cpu: 1000m
            memory: 64Mi
          requests:
            cpu: 5m
            memory: 64Mi
        exporter:
          limits:
            cpu: 1000m
            memory: 128Mi
          requests:
            cpu: 15m
            memory: 128Mi
        logcollector:
          limits:
            cpu: 200m
            memory: 512Mi
          requests:
            cpu: 200m
            memory: 512Mi
        mgr:
          limits:
            cpu: 2000m
            memory: 2048Mi
          requests:
            cpu: 40m
            memory: 2048Mi
        mgr-sidecar:
          limits:
            cpu: 2000m
            memory: 100Mi
          requests:
            cpu: 40m
            memory: 100Mi
        mon:
          limits:
            cpu: 1000m
            memory: 2048Mi
          requests:
            cpu: 1000m
            memory: 2048Mi
        osd:
          limits:
            cpu: 1000m
            memory: 8192Mi
          requests:
            cpu: 1000m
            memory: 8192Mi
        prepareosd:
          limits:
            cpu: 2000m
            memory: 512Mi # This needs to be above 128 or phantom oomkills happen during osd provisioning
          requests:
            cpu: 500m
            memory: 512Mi #
      storage:
        useAllNodes: true
        useAllDevices: false
        devicePathFilter: /dev/disk/by-id/nvme-(WD_BLACK_SN850X_2000GB_.*|Samsung_SSD_970_EVO_Plus_1TB_.*).*
        config:
          osdsPerDevice: "1"
    cephBlockPools:
      - name: ceph-blockpool
        spec:
          failureDomain: host
          replicated:
            size: 3
        storageClass:
          enabled: true
          name: ceph-block
          isDefault: true
          reclaimPolicy: Delete
          allowVolumeExpansion: true
          volumeBindingMode: Immediate
          mountOptions:
            - discard
          parameters:
            imageFormat: "2"
            imageFeatures: layering,fast-diff,object-map,deep-flatten,exclusive-lock
            csi.storage.k8s.io/provisioner-secret-name: rook-csi-rbd-provisioner
            csi.storage.k8s.io/provisioner-secret-namespace: "{{ .Release.Namespace }}"
            csi.storage.k8s.io/controller-expand-secret-name: rook-csi-rbd-provisioner
            csi.storage.k8s.io/controller-expand-secret-namespace: "{{ .Release.Namespace }}"
            csi.storage.k8s.io/node-stage-secret-name: rook-csi-rbd-node
            csi.storage.k8s.io/node-stage-secret-namespace: "{{ .Release.Namespace }}"
            csi.storage.k8s.io/fstype: ext4
    cephBlockPoolsVolumeSnapshotClass:
      enabled: true
      name: csi-ceph-blockpool
      isDefault: false
      deletionPolicy: Delete
    cephFileSystems: []
    #    cephFileSystems:
    #      - name: &cephFileSystemName ceph-filesystem
    #        spec:
    #          metadataPool:
    #            replicated:
    #              size: 3
    #          dataPools:
    #            - failureDomain: host
    #              replicated:
    #                size: 3
    #              name: data0
    #          metadataServer:
    #            activeCount: 1
    #            activeStandby: true
    #            priorityClassName: system-cluster-critical
    #            placement:
    #              topologySpreadConstraints:
    #                - maxSkew: 1
    #                  topologyKey: kubernetes.io/hostname
    #                  whenUnsatisfiable: DoNotSchedule
    #                  labelSelector:
    #                    matchLabels:
    #                      app.kubernetes.io/name: ceph-mds
    #                      app.kubernetes.io/part-of: *cephFileSystemName
    #            resources:
    #              requests:
    #                cpu: 1000m
    #                memory: 4096Mi
    #              limits:
    #                cpu: 1000m
    #                memory: 4096Mi
    #        storageClass:
    #          enabled: true
    #          isDefault: false
    #          name: ceph-filesystem
    #          pool: data0
    #          reclaimPolicy: Delete
    #          allowVolumeExpansion: true
    #          volumeBindingMode: Immediate
    #          parameters:
    #            csi.storage.k8s.io/provisioner-secret-name: rook-csi-cephfs-provisioner
    #            csi.storage.k8s.io/provisioner-secret-namespace: "{{ .Release.Namespace }}"
    #            csi.storage.k8s.io/controller-expand-secret-name: rook-csi-cephfs-provisioner
    #            csi.storage.k8s.io/controller-expand-secret-namespace: "{{ .Release.Namespace }}"
    #            csi.storage.k8s.io/node-stage-secret-name: rook-csi-cephfs-node
    #            csi.storage.k8s.io/node-stage-secret-namespace: "{{ .Release.Namespace }}"
    #            csi.storage.k8s.io/fstype: ext4
    #    cephFileSystemVolumeSnapshotClass:
    #      enabled: true
