---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: irqbalance
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  interval: 30m
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      fstrim:
        containers:
          app:
            env:
              # See: https://gist.github.com/gavinmcfall/ea6cb1233d3a300e9f44caf65a32d519
              IRQBALANCE_BANNED_CPULIST: 8-15 # 8-15 are E-cores
              IRQBALANCE_DEBUG: false
            image:
              repository: ghcr.io/home-operations/irqbalance
              tag: 1.9.5@sha256:5c58790f22fea1e331b3312977005e66586ced3d39e2d0e4fddb7dfacf873fb5
            securityContext:
              capabilities: { drop: ["ALL"] }
              readOnlyRootFilesystem: true
              privileged: true
            resources:
              limits:
                cpu: 1000m
                memory: 8Mi
              requests:
                cpu: 20m
                memory: 8Mi
        type: daemonset
    defaultPodOptions:
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      hostIPC: true
      hostPID: true
    persistence:
      run:
        type: emptyDir
        globalMounts:
          - path: /run/irqbalance
