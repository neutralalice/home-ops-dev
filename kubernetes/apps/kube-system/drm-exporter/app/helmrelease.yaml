---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: drm-exporter
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: drm-exporter
  values:
    fullnameOverride: drm-exporter
    # Drop SYS_RAWIO from the chart default — only the (unavailable) MSR path uses it.
    securityContext:
      capabilities:
        add: [PERFMON]
    config:
      logLevel: info
    monitoring:
      serviceMonitor:
        enabled: true
        relabelings:
          - sourceLabels: [__meta_kubernetes_endpoint_node_name]
            targetLabel: nodename
      dashboards:
        enabled: true
        grafanaOperator:
          enabled: true
          matchLabels:
            grafana.internal/instance: grafana
    # Device access via the Intel GPU DRA driver's admin-access monitor claim.
    # Tolerations keep it monitoring GPUs the driver taints on a health warning.
    dra:
      enabled: true
      adminAccess: true
      deviceClassName: gpu.intel.com
      allocationMode: All
      Count: 1
      tolerations:
        - effect: NoExecute
        - effect: NoSchedule
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        cpu: 1000m
        memory: 64Mi
