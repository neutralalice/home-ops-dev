---
apiVersion: monitoring.coreos.com/v1alpha1
kind: ScrapeConfig
metadata:
  name: blackbox-exporter-dns
spec:
  jobName: blackbox-dns
  scrapeInterval: 90s
  scrapeTimeout: 5s
  staticConfigs:
    - targets:
        - 172.16.69.1
        - 1.0.0.1
        - 1.1.1.1
        - 2606:4700:4700::1001
        - 2606:4700:4700::1111
      labels:
        prober: dns
        module: dns_a
    - targets:
        - 172.16.69.1
        - 1.0.0.1
        - 1.1.1.1
        - 2606:4700:4700::1001
        - 2606:4700:4700::1111
      labels:
        prober: dns
        module: dns_aaaa
    - targets:
        - 172.16.69.1
        - 1.0.0.1
        - 1.1.1.1
        - 2606:4700:4700::1001
        - 2606:4700:4700::1111
      labels:
        prober: dns
        module: dns_caa
    - targets:
        - 172.16.69.1
        - 1.0.0.1
        - 1.1.1.1
        - 2606:4700:4700::1001
        - 2606:4700:4700::1111
      labels:
        prober: dns
        module: dns_soa
    - targets:
        - 172.16.69.1
        - 1.1.1.1
        - 1.0.0.1
        - 2606:4700:4700::1111
        - 2606:4700:4700::1001
      labels:
        prober: dns
        module: dns_txt
  metricsPath: /probe
  relabelings:
    - sourceLabels: [__address__]
      action: replace
      targetLabel: instance
    - sourceLabels: [__address__]
      action: replace
      targetLabel: __param_target
    - targetLabel: __address__
      action: replace
      replacement: blackbox-exporter.observability.svc.cluster.local:9115
    - sourceLabels: [module]
      action: replace
      targetLabel: __param_module
    - sourceLabels: [module]
      action: labeldrop
---
apiVersion: monitoring.coreos.com/v1alpha1
kind: ScrapeConfig
metadata:
  name: blackbox-exporter-http
spec:
  jobName: blackbox-http
  scrapeInterval: 15s
  scrapeTimeout: 5s
  staticConfigs:
    - targets:
        - https://${BLACKBOX_IP4_EXTERNAL_ADDRESS}:8443
        - https://[${BLACKBOX_IP6_EXTERNAL_ADDRESS}]:8443
      labels:
        prober: http
        module: quic
    - targets:
        - https://${BLACKBOX_IP4_EXTERNAL_ADDRESS}:8443
        - https://${BLACKBOX_IP4_EXTERNAL_DOMAIN}
      labels:
        prober: http
        module: http4
    - targets:
        - https://[${BLACKBOX_IP6_EXTERNAL_ADDRESS}]:8443
        - https://${BLACKBOX_IP6_EXTERNAL_DOMAIN}
      labels:
        prober: http
        module: http6
  metricsPath: /probe
  relabelings:
    - sourceLabels: [__address__]
      action: replace
      targetLabel: instance
    - sourceLabels: [__address__]
      action: replace
      targetLabel: __param_target
    - targetLabel: __address__
      action: replace
      replacement: blackbox-exporter.observability.svc.cluster.local:9115
    - sourceLabels: [module]
      action: replace
      targetLabel: __param_module
    - sourceLabels: [module]
      action: labeldrop
---
apiVersion: monitoring.coreos.com/v1alpha1
kind: ScrapeConfig
metadata:
  name: blackbox-exporter-tcp
spec:
  jobName: blackbox-tcp
  scrapeInterval: 15s
  scrapeTimeout: 5s
  staticConfigs:
    - targets:
        - 172.16.69.17:2049
      labels:
        prober: tcp
        module: tcp
  metricsPath: /probe
  relabelings:
    - sourceLabels: [__address__]
      action: replace
      targetLabel: instance
    - sourceLabels: [__address__]
      action: replace
      targetLabel: __param_target
    - targetLabel: __address__
      action: replace
      replacement: blackbox-exporter.observability.svc.cluster.local:9115
    - sourceLabels: [module]
      action: replace
      targetLabel: __param_module
    - sourceLabels: [module]
      action: labeldrop
