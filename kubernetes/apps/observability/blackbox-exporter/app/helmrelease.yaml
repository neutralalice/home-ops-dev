---
# yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: blackbox-exporter
spec:
  chartRef:
    kind: OCIRepository
    name: blackbox-exporter
  interval: 1h
  values:
    fullnameOverride: blackbox-exporter
    config:
      modules:
        dns:
          prober: dns
        dns_a:
          prober: dns
          dns:
            query_type: "A"
        dns_aaaa:
          prober: dns
          dns:
            query_type: "AAAA"
        dns_caa:
          prober: dns
          dns:
            query_type: "CAA"
        dns_soa:
          prober: dns
          dns:
            query_type: "SOA"
        dns_txt:
          prober: dns
          dns:
            query_type: "TXT"
        http:
          prober: http
        http4:
          prober: http
          http:
            preferred_ip_protocol: "ip4"
            ip_protocol_fallback: false
        http6:
          prober: http
          http:
            preferred_ip_protocol: "ip6"
            ip_protocol_fallback: false
        icmp:
          prober: icmp
        icmp4:
          prober: icmp
          icmp:
            preferred_ip_protocol: "ip4"
            ip_protocol_fallback: false
        icmp6:
          prober: icmp
          icmp:
            preferred_ip_protocol: "ip6"
            ip_protocol_fallback: false
        quic:
          prober: http
          http:
            enable_http3: true
            enable_http2: false
            valid_http_versions: ["HTTP/3.0"]
        quic4:
          prober: http
          http:
            preferred_ip_protocol: "ip4"
            ip_protocol_fallback: false
            enable_http3: true
            enable_http2: false
            valid_http_versions: ["HTTP/3.0"]
        quic6:
          prober: http
          http:
            preferred_ip_protocol: "ip6"
            ip_protocol_fallback: false
            enable_http3: true
            enable_http2: false
            valid_http_versions: ["HTTP/3.0"]
        tcp:
          prober: tcp
        tcp4:
          prober: tcp
          timeout: 5s
          tcp:
            preferred_ip_protocol: "ip4"
            ip_protocol_fallback: false
        tcp6:
          prober: tcp
          timeout: 5s
          tcp:
            preferred_ip_protocol: "ip6"
            ip_protocol_fallback: false
        websocket:
          prober: websocket
        unix_socket:
          prober: unix
          timeout: 5s
          unix:
            query_response:
              - send: "PING"
              - expect: "PONG"
    podAnnotations:
      reloader.stakater.com/auto: "true"
    podSecurityContext:
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
      fsGroupChangePolicy: OnRootMismatch
      seccompProfile:
        type: RuntimeDefault
    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      runAsNonRoot: true
      capabilities:
        add:
          - "NET_RAW"
        drop:
          - "ALL"
    service:
      ipFamilyPolicy: PreferDualStack
    resources:
      limits:
        cpu: 2000m
        memory: 64Mi
      requests:
        cpu: 10m
        memory: 64Mi
    serviceMonitor:
      enabled: true
      defaults:
        interval: 1m
        scrapeTimeout: 10s
    prometheusRule:
      enabled: true
      rules:
        - alert: BlackboxProbeFailed
          expr: probe_success == 0
          for: 10m
          labels:
            severity: critical
          annotations:
            summary: |-
              The host {{ $labels.target }} is currently unreachable
