---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-secrets
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    creationPolicy: Owner
    template:
      data:
        GRAFANA_INITIAL_ADMIN_PASSWORD: "{{ .INITIAL_ADMIN_PASSWORD }}"
  dataFrom:
    - extract:
        key: grafana
