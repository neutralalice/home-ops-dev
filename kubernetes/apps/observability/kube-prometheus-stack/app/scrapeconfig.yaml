---
apiVersion: monitoring.coreos.com/v1alpha1
kind: ScrapeConfig
metadata:
  name: node-exporter
spec:
  jobName: node-exporter
  scrapeInterval: 15s
  scrapeTimeout: 5s
  staticConfigs:
    - targets:
        - 172.16.69.1:9100
        - 172.16.69.5:9100
        - 172.16.69.6:9100
        - 172.16.69.17:9100
  metricsPath: /metrics
