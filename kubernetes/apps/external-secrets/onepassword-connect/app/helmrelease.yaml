---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: onepassword-connect
spec:
  chartRef:
    kind: OCIRepository
    name: onepassword-connect
  interval: 1h
  values:
    connect:
      annotations:
        reloader.stakater.com/auto: "true"
      api:
        httpPort: 80
        imageRepository: ghcr.io/1password/connect-api
        serviceMonitor:
          enabled: true
        resources: &resources
          limits:
            cpu: 200m
            memory: 64Mi
          requests:
            cpu: 10m
            memory: 64Mi
        securityContext: &securityContext
          allowPrivilegeEscalation: false
          capabilities: { drop: ["ALL"] }
          readOnlyRootFilesystem: true
      credentialsName: onepassword-connect-credentials-secret
      podSecurityContext:
        fsGroup: 999
        fsGroupChangePolicy: OnRootMismatch
        runAsUser: 999
        runAsGroup: 999
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      sync:
        imageRepository: ghcr.io/1password/connect-sync
        resources: *resources
        securityContext: *securityContext
