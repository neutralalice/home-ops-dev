---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: onepassword-connect-credentials
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: onepassword-connect-credentials-secret
    template:
      data:
        1password-credentials.json: "{{ .credentials }}"
  dataFrom:
    - extract:
        key: 1password connect
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: onepassword-connect-token
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: onepassword-connect-vault-secret
    template:
      data:
        token: "{{ .token }}"
  dataFrom:
    - extract:
        key: 1password connect
