---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflare-tunnel-secrets
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    creationPolicy: Owner
    template:
      data:
        CLOUDFLARE_TUNNEL_TOKEN: "{{ .TUNNEL_TOKEN }}"
  dataFrom:
    - extract:
        key: cloudflare
